[server]
# Não fazer fileWatch automático em produção
fileWatcherType = "none"
# Limite máximo de upload (não usamos uploads, mantém pequeno)
maxUploadSize = 50

[browser]
gatherUsageStats = false

[theme]
# Tema claro, sóbrio
base = "light"
primaryColor = "#1f2937"
backgroundColor = "#fafaf9"
secondaryBackgroundColor = "#ffffff"
textColor = "#1a1a1a"
font = "sans serif"
